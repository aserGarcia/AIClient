name: Build AppImage

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  LLAMA_CPP_VERSION: master  # or specify a version like 'b3561'

jobs:
  build-appimage:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
    
    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-registry-
    
    - name: Cache cargo index
      uses: actions/cache@v4
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-git-
    
    - name: Cache cargo build
      uses: actions/cache@v4
      with:
        path: target
        key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-build-target-
    
    - name: Cache llama.cpp build
      uses: actions/cache@v4
      with:
        path: /tmp/llama.cpp/build
        key: ${{ runner.os }}-llama-cpp-${{ env.LLAMA_CPP_VERSION }}
        restore-keys: |
          ${{ runner.os }}-llama-cpp-
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          gcc-11 \
          g++-11 \
          libstdc++-12-dev \
          imagemagick \
          desktop-file-utils \
          fuse \
          libfuse2 \
          pkg-config
        
        # Set GCC 11 as default (aws-lc-sys requires GCC >= 10)
        sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-11 100
        sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-11 100
        sudo update-alternatives --set gcc /usr/bin/gcc-11
        sudo update-alternatives --set g++ /usr/bin/g++-11
        
        # Verify
        gcc --version
        g++ --version
    
    - name: Install appimagetool
      run: |
        mkdir -p ~/bin
        wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
        chmod +x appimagetool-x86_64.AppImage
        mv appimagetool-x86_64.AppImage ~/bin/appimagetool
        echo "$HOME/bin" >> $GITHUB_PATH
    
    - name: Install cargo-appimage
      run: |
        cargo install cargo-appimage
    
    - name: Build llama-server with CMake (official method)
      run: |
        # Clone llama.cpp
        git clone https://github.com/ggml-org/llama.cpp.git /tmp/llama.cpp
        cd /tmp/llama.cpp
        
        # Checkout specific version if needed
        git checkout ${{ env.LLAMA_CPP_VERSION }}
        
        # Create build directory
        mkdir -p build
        cd build
        
        # Configure with CMake (following official instructions)
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DGGML_NATIVE=OFF \
          -DGGML_CUDA=OFF \
          -DGGML_METAL=OFF \
          -DBUILD_SHARED_LIBS=OFF
        
        # Build server target
        cmake --build . --config Release --target llama-server -j$(nproc)
        
        # Verify it was built
        ls -la bin/llama-server
        file bin/llama-server
        
        # Copy to workspace root
        cp bin/llama-server ${{ github.workspace }}/
        chmod +x ${{ github.workspace }}/llama-server
    
    - name: Verify llama-server
      run: |
        ls -lh llama-server
        file llama-server
        ./llama-server --version || ./llama-server --help || echo "llama-server built successfully"
        echo "=== Dependencies ==="
        ldd llama-server || true
    
    - name: Create or verify icon
      run: |
        # If you have an icon in your repo, make sure it's named icon.png
        if [ ! -f "icon.png" ]; then
          echo "Creating placeholder icon"
          convert -size 256x256 xc:#4A90E2 \
            -pointsize 72 -fill white -gravity center \
            -annotate +0+0 "AI" \
            icon.png
        fi
        
        # Ensure it's the right size (256x256 is standard for AppImage)
        convert icon.png -resize 256x256 icon.png
        
        # Verify
        file icon.png
        identify icon.png
    
    - name: Configure Cargo.toml for appimage
      run: |
        # Check if appimage config exists in Cargo.toml
        if ! grep -q "\[package.metadata.appimage\]" Cargo.toml; then
          echo "Adding appimage configuration to Cargo.toml"
          cat >> Cargo.toml <<'EOF'

        [package.metadata.appimage]
        assets = ["llama-server"]
        auto_link = true
        auto_link_exclude_list = ["libc.so*", "libdl.so*", "libpthread.so*"]
        EOF
        fi
        
        # Show the config
        echo "=== Cargo.toml appimage config ==="
        grep -A 5 "\[package.metadata.appimage\]" Cargo.toml || echo "Config added"
    
    - name: Build AppImage with cargo-appimage
      env:
        CXX: g++-9
        CC: gcc-9
      run: |
        # Unset any problematic flags
        unset CXXFLAGS
        unset LDFLAGS
        
        # Verify all required files are present
        echo "=== Files before build ==="
        ls -la llama-server icon.png
        
        # Build the AppImage
        cargo appimage --verbose
    
    - name: Find and verify AppImage
      id: find_appimage
      run: |
        # Find the generated AppImage
        APPIMAGE=$(find . -name "*.AppImage" -type f | head -n 1)
        
        if [ -z "$APPIMAGE" ]; then
          echo "ERROR: No AppImage found!"
          echo "Searching for any .AppImage files:"
          find . -name "*.AppImage" -type f
          exit 1
        fi
        
        echo "Found AppImage: $APPIMAGE"
        ls -lh "$APPIMAGE"
        
        # Make it executable
        chmod +x "$APPIMAGE"
        
        # Extract and verify contents
        "$APPIMAGE" --appimage-extract
        echo ""
        echo "=== AppImage contents ==="
        ls -la squashfs-root/
        echo ""
        echo "=== Desktop file ==="
        find squashfs-root -name "*.desktop" -exec cat {} \; || echo "No desktop file found"
        echo ""
        echo "=== Icon files ==="
        find squashfs-root -name "*.png" -ls || echo "No icon found"
        echo ""
        echo "=== Binaries ==="
        find squashfs-root -type f -executable -ls
        echo ""
        echo "=== Checking for llama-server ==="
        find squashfs-root -name "llama-server" -ls || echo "llama-server not found in AppImage!"
        
        # Clean up extracted files
        rm -rf squashfs-root
        
        # Set output for next steps
        APPIMAGE_NAME=$(basename "$APPIMAGE")
        echo "appimage_path=$APPIMAGE" >> $GITHUB_OUTPUT
        echo "appimage_name=$APPIMAGE_NAME" >> $GITHUB_OUTPUT
    
    - name: Upload AppImage artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.find_appimage.outputs.appimage_name }}
        path: ${{ steps.find_appimage.outputs.appimage_path }}
        if-no-files-found: error
        retention-days: 30
    
    - name: Create checksum
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        sha256sum ${{ steps.find_appimage.outputs.appimage_path }} > ${{ steps.find_appimage.outputs.appimage_path }}.sha256
        cat ${{ steps.find_appimage.outputs.appimage_path }}.sha256
    
    - name: Create Release (on tag push)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ${{ steps.find_appimage.outputs.appimage_path }}
          ${{ steps.find_appimage.outputs.appimage_path }}.sha256
        draft: false
        prerelease: false
        generate_release_notes: true
        body: |
          ## AppImage Release
          
          This release includes:
          - Built with llama.cpp ${{ env.LLAMA_CPP_VERSION }}
          - Bundled llama-server binary
          
          ### Installation
          ```bash
                    # Download the AppImage
                    wget ${{ github.server_url }}/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ steps.find_appimage.outputs.appimage_name }}
                    
                    # Make it executable
                    chmod +x ${{ steps.find_appimage.outputs.appimage_name }}
                    
                    # Run it
                    ./${{ steps.find_appimage.outputs.appimage_name }}
          ```
                    
                    ### Verify checksum
          ```bash
                    sha256sum -c ${{ steps.find_appimage.outputs.appimage_name }}.sha256
          ```
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
