name: Build macOS App

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  release:
    types: [created, published]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  LLAMA_CPP_VERSION: master

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14  # Apple Silicon runner
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-apple-darwin
    
    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-registry-
    
    - name: Cache cargo index
      uses: actions/cache@v4
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-git-
    
    - name: Cache cargo build
      uses: actions/cache@v4
      with:
        path: target
        key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-build-target-
    
    - name: Install system dependencies
      run: |
        brew install cmake create-dmg
    
    - name: Build llama-server for Apple Silicon
      run: |
        # Clean up any existing directory
        rm -rf /tmp/llama.cpp
        
        # Clone llama.cpp
        git clone https://github.com/ggml-org/llama.cpp.git /tmp/llama.cpp
        cd /tmp/llama.cpp
        
        # Checkout specific version if needed
        git checkout ${{ env.LLAMA_CPP_VERSION }}
        
        # Create build directory
        mkdir -p build
        cd build
        
        # Configure with CMake for ARM64 with Metal support
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DGGML_NATIVE=OFF \
          -DGGML_METAL=ON \
          -DGGML_METAL_EMBED_LIBRARY=ON \
          -DBUILD_SHARED_LIBS=OFF
        
        # Build server target
        cmake --build . --config Release --target llama-server -j$(sysctl -n hw.ncpu)
        
        # Verify it was built
        ls -la bin/llama-server
        file bin/llama-server
        
        # Copy to workspace
        cp bin/llama-server ${{ github.workspace }}/llama-server
        chmod +x ${{ github.workspace }}/llama-server
    
    - name: Verify llama-server
      run: |
        ls -lh llama-server
        file llama-server
        ./llama-server --version || ./llama-server --help || echo "llama-server built successfully"
    
    - name: Get app info
      id: app_info
      run: |
        APP_NAME=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].name')
        VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
        echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Building $APP_NAME v$VERSION"
    
    - name: Build Rust application for Apple Silicon
      env:
        APP_NAME: ${{ steps.app_info.outputs.app_name }}
      run: |
        # Build for ARM64
        cargo build --release --target aarch64-apple-darwin
        
        # Copy binary
        cp target/aarch64-apple-darwin/release/${APP_NAME} ${APP_NAME}
        chmod +x ${APP_NAME}
        
        # Verify
        echo "=== App binary info ==="
        file ${APP_NAME}
    
    - name: Create .app bundle
      env:
        APP_NAME: ${{ steps.app_info.outputs.app_name }}
        VERSION: ${{ steps.app_info.outputs.version }}
      run: |
        # Create .app structure
        mkdir -p "${APP_NAME}.app/Contents/MacOS"
        mkdir -p "${APP_NAME}.app/Contents/Resources"
        
        # Copy binaries
        cp ${APP_NAME} "${APP_NAME}.app/Contents/MacOS/"
        cp llama-server "${APP_NAME}.app/Contents/MacOS/"
        
        # Create Info.plist
        cat > "${APP_NAME}.app/Contents/Info.plist" <<EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>${APP_NAME}</string>
            <key>CFBundleIdentifier</key>
            <string>com.example.${APP_NAME}</string>
            <key>CFBundleName</key>
            <string>${APP_NAME}</string>
            <key>CFBundleVersion</key>
            <string>${VERSION}</string>
            <key>CFBundleShortVersionString</key>
            <string>${VERSION}</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>11.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
        </dict>
        </plist>
        EOF
        
        # Copy or create icon (if you have one)
        if [ -f "icon.icns" ]; then
          cp icon.icns "${APP_NAME}.app/Contents/Resources/${APP_NAME}.icns"
        elif [ -f "icon.png" ]; then
          # Convert PNG to ICNS
          mkdir -p "${APP_NAME}.iconset"
          sips -z 16 16 icon.png --out "${APP_NAME}.iconset/icon_16x16.png"
          sips -z 32 32 icon.png --out "${APP_NAME}.iconset/icon_16x16@2x.png"
          sips -z 32 32 icon.png --out "${APP_NAME}.iconset/icon_32x32.png"
          sips -z 64 64 icon.png --out "${APP_NAME}.iconset/icon_32x32@2x.png"
          sips -z 128 128 icon.png --out "${APP_NAME}.iconset/icon_128x128.png"
          sips -z 256 256 icon.png --out "${APP_NAME}.iconset/icon_128x128@2x.png"
          sips -z 256 256 icon.png --out "${APP_NAME}.iconset/icon_256x256.png"
          sips -z 512 512 icon.png --out "${APP_NAME}.iconset/icon_256x256@2x.png"
          sips -z 512 512 icon.png --out "${APP_NAME}.iconset/icon_512x512.png"
          sips -z 1024 1024 icon.png --out "${APP_NAME}.iconset/icon_512x512@2x.png"
          iconutil -c icns "${APP_NAME}.iconset" -o "${APP_NAME}.app/Contents/Resources/${APP_NAME}.icns"
          rm -rf "${APP_NAME}.iconset"
        fi
        
        # Make executables
        chmod +x "${APP_NAME}.app/Contents/MacOS/${APP_NAME}"
        chmod +x "${APP_NAME}.app/Contents/MacOS/llama-server"
        
        # Verify structure
        echo "=== .app bundle structure ==="
        ls -la "${APP_NAME}.app/Contents/MacOS/"
    
    - name: Create DMG
      env:
        APP_NAME: ${{ steps.app_info.outputs.app_name }}
        VERSION: ${{ steps.app_info.outputs.version }}
      run: |
        # Create DMG with create-dmg
        create-dmg \
          --volname "${APP_NAME}" \
          --window-pos 200 120 \
          --window-size 600 400 \
          --icon-size 100 \
          --app-drop-link 425 120 \
          "${APP_NAME}-${VERSION}-arm64.dmg" \
          "${APP_NAME}.app" || true
        
        # Fallback: create simple DMG if create-dmg fails
        if [ ! -f "${APP_NAME}-${VERSION}-arm64.dmg" ]; then
          echo "create-dmg failed, using hdiutil..."
          hdiutil create -volname "${APP_NAME}" \
            -srcfolder "${APP_NAME}.app" \
            -ov -format UDZO \
            "${APP_NAME}-${VERSION}-arm64.dmg"
        fi
        
        # Verify DMG
        ls -lh "${APP_NAME}-${VERSION}-arm64.dmg"
        
        echo "dmg_path=${APP_NAME}-${VERSION}-arm64.dmg" >> $GITHUB_OUTPUT
        echo "dmg_name=${APP_NAME}-${VERSION}-arm64.dmg" >> $GITHUB_ENV
      id: create_dmg
    
    - name: Upload DMG artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.app_info.outputs.app_name }}-${{ steps.app_info.outputs.version }}-macOS-arm64-DMG
        path: ${{ steps.create_dmg.outputs.dmg_path }}
        if-no-files-found: error
        retention-days: 30
    
    - name: Create checksum
      if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
      run: |
        shasum -a 256 ${{ steps.create_dmg.outputs.dmg_path }} > ${{ steps.create_dmg.outputs.dmg_path }}.sha256
        cat ${{ steps.create_dmg.outputs.dmg_path }}.sha256
    
    - name: Upload to Release
      if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.release.tag_name || github.ref_name }}
        files: |
          ${{ steps.create_dmg.outputs.dmg_path }}
          ${{ steps.create_dmg.outputs.dmg_path }}.sha256
        fail_on_unmatched_files: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
